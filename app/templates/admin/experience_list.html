{% extends "admin/base.html" %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Experience</h2>

  <a href="{{ url_for('admin.experience_create') }}" class="btn btn-dark">
    Add Experience
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>Company</th>
          <th>Role</th>
          <th>Period</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        {% for exp in experiences %}

        <tr>
          <td>{{ exp.company }}</td>

          <td>{{ exp.role }}</td>

          <td>
            {{ exp.start_date }} - {% if exp.end_date %} {{ exp.end_date }} {%
            else %}
            <span class="badge bg-success">Present</span>
            {% endif %}
          </td>

          <td>
            <a
              href="{{ url_for('admin.experience_edit', id=exp.id) }}"
              class="btn btn-sm btn-primary"
            >
              Edit
            </a>

            <form
              method="POST"
              action="{{ url_for('admin.experience_delete', id=exp.id) }}"
              style="display: inline"
            >
              <button class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>

        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
