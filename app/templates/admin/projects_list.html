{% extends "admin/base.html" %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Projects</h2>

  <a href="{{ url_for('admin.project_create') }}" class="btn btn-dark">
    Add Project
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead class="table-light">
          <tr>
            <th>Name</th>
            <th>Github</th>
            <th>Live</th>
            <th width="150">Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for project in projects %}

          <tr>
            <td>{{ project.name }}</td>

            <td>
              <a href="{{ project.github_link }}" target="_blank"> Github </a>
            </td>

            <td>
              <a href="{{ project.live_link }}" target="_blank"> Live </a>
            </td>

            <td>
              <a
                href="{{ url_for('admin.project_edit', id=project.id) }}"
                class="btn btn-sm btn-outline-primary"
              >
                Edit
              </a>

              <form
                method="POST"
                action="{{ url_for('admin.project_delete', id=project.id) }}"
                style="display: inline"
              >
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </form>
            </td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock %}
